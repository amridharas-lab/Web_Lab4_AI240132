<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Data Display</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="icon" href="data:,">
</head>
<body>
    <h1>Lab 4b: jQuery and JSON Display</h1>
    <p>Sila lihat Inspect > Console untuk output.</p>
    <script>
        $(document).ready(function() {
            $.getJSON('books.json', function(data) {
                // 1. Title of the first book
                console.log("Title of first book: " + data[0].title);

                // 2. Author of the second book
                console.log("Author of second book: " + data[1].author);

                // 3. Genres of all books
                console.log("Genres of all books:");
                $.each(data, function(index, book) {
                    console.log(book.title + " Genres: " + book.genres.join(", "));
                });
            });
        });
    </script>
</body>
</html>
